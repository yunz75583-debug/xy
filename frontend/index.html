<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#f5f4f1">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>小舟</title>
<style>
:root{
  /* ---- palette: warm stone neutrals + a single muted accent ---- */
  --bg-page:#eae8e3;
  --bg:#f6f5f2;
  --surface:#ffffff;
  --border:#e3e1da;
  --border-strong:#d3d0c7;
  --text:#1c1b19;
  --text-muted:#726f68;
  --text-faint:#a29e94;
  --accent:#3f4a3f;
  --accent-strong:#2e3730;
  --on-accent:#f6f5f2;
  --danger:#8a4a3a;
  --danger-bg:#f3e9e5;

  /* ---- spacing scale ---- */
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:28px; --sp-7:40px;

  /* ---- radius scale ---- */
  --r-sm:8px; --r-md:12px; --r-lg:18px; --r-full:999px;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{
  margin:0; padding:0; height:100vh; width:100%;
  overflow:hidden; overscroll-behavior:none;
  background:var(--bg-page);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  letter-spacing:0.1px;
}
button{ font-family:inherit; cursor:pointer; }

body{ display:flex; align-items:center; justify-content:center; }

#app{
  height:100vh; width:100%;
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
  background:var(--bg);
}

@media (min-width:701px){
  #app{
    max-width:720px;
    height:min(900px, 94vh);
    margin:var(--sp-6) 0;
    border-radius:24px;
    border:1px solid var(--border);
    box-shadow:0 30px 70px -20px rgba(20,20,15,0.18);
  }
}

/* ---------- top bar ---------- */
#topbar{
  flex:0 0 auto;
  display:flex; align-items:center; justify-content:space-between;
  gap:var(--sp-4);
  padding:calc(var(--sp-4) + env(safe-area-inset-top)) var(--sp-5) var(--sp-4);
  background:var(--surface);
  border-bottom:1px solid var(--border);
}
.icon-btn{
  width:38px; height:38px; border-radius:50%; flex-shrink:0;
  background:none; border:1px solid transparent;
  color:var(--text-muted);
  display:flex; align-items:center; justify-content:center;
  transition:background .15s ease, color .15s ease;
}
.icon-btn:hover{ background:var(--bg); color:var(--text); }
.title-block{
  flex:1; min-width:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.title-name{
  font-weight:600; font-size:16px; letter-spacing:0.4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
  color:var(--text);
}
.title-sub{
  display:flex; align-items:center; gap:5px;
  font-size:11.5px; color:var(--text-faint); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.title-sub svg{ flex-shrink:0; }
.token-chip{
  flex-shrink:0;
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:5px 12px;
  text-align:center;
  min-width:56px;
}
.token-chip #topTokens{ font-size:13px; font-weight:600; color:var(--text); line-height:1.25; }
.token-chip .token-label{ font-size:9.5px; color:var(--text-faint); line-height:1.25; letter-spacing:0.3px; text-transform:uppercase; }

/* ---------- message list ---------- */
#messages{
  flex:1 1 auto;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:var(--sp-5) var(--sp-5) var(--sp-6);
  background:var(--bg);
}

.msg-group{ margin-bottom:var(--sp-6); display:flex; flex-direction:column; }
.msg-group.user{ align-items:flex-end; }
.msg-group.ai{ align-items:flex-start; }

.msg-header{ display:flex; align-items:center; gap:var(--sp-2); margin-bottom:var(--sp-2); }
.msg-group.user .msg-header{ flex-direction:row-reverse; }
.avatar{
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:12.5px; font-weight:600;
  background:var(--surface); border:1px solid var(--border-strong); color:var(--text-muted);
}
.msg-group.user .avatar{ background:var(--accent); border-color:var(--accent); color:var(--on-accent); }
.header-text{ display:flex; flex-direction:column; }
.msg-group.user .header-text{ align-items:flex-end; }
.name{ font-size:12px; color:var(--text-muted); font-weight:600; }
.time{ font-size:10.5px; color:var(--text-faint); margin-top:1px; }

.thinking-fold{ max-width:88%; margin-bottom:var(--sp-2); }
.thinking-toggle{
  font-size:12px; color:var(--text-faint); cursor:pointer; user-select:none;
  display:flex; align-items:center; gap:5px;
}
.thinking-toggle .fold-arrow{
  font-size:9px; display:inline-block; transition:transform .15s ease; color:var(--text-faint);
}
.thinking-fold.expanded .fold-arrow{ transform:rotate(90deg); }
.thinking-body{
  display:none; margin-top:var(--sp-2); padding:var(--sp-3);
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md);
  font-size:12px; line-height:1.6; color:var(--text-faint); white-space:pre-wrap;
}
.thinking-fold.expanded .thinking-body{ display:block; }

.tool-fold{
  max-width:88%; margin-bottom:var(--sp-2);
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r-md);
  padding:var(--sp-3) var(--sp-4);
}
.tool-toggle{
  display:flex; align-items:center; gap:var(--sp-2); cursor:pointer; user-select:none;
  font-size:12.5px; color:var(--text-muted);
}
.tool-toggle svg{ color:var(--text-faint); flex-shrink:0; }
.tool-fold.expanded .fold-arrow{ transform:rotate(90deg); }
.tool-body{ display:none; margin-top:var(--sp-3); }
.tool-fold.expanded .tool-body{ display:block; }
.tool-section-label{
  font-size:10px; color:var(--text-faint); font-weight:600; margin:var(--sp-2) 0 var(--sp-1);
  text-transform:uppercase; letter-spacing:0.4px;
}
.tool-pre{
  background:var(--bg); border:1px solid var(--border); border-radius:var(--r-sm);
  padding:var(--sp-2) var(--sp-3); margin:0;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:11px; line-height:1.5; color:var(--text-muted);
  white-space:pre-wrap; word-break:break-word;
  max-height:220px; overflow-y:auto;
}

.quote{ max-width:82%; border-radius:var(--r-sm); padding:var(--sp-2) var(--sp-3); margin-bottom:var(--sp-2); }
.quote-name{ font-size:11px; font-weight:700; margin-bottom:2px; }
.quote-text{
  font-size:12px; color:var(--text-muted);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.quote-user-style{ background:var(--surface); border-left:3px solid var(--text); border:1px solid var(--border); border-left-width:3px; }
.quote-ai-style{ background:var(--bg); border:1px solid var(--border); border-left:3px solid var(--accent); }
.quote-ai-style .quote-name{ color:var(--accent); }
.quote-user-style .quote-name{ color:var(--text); }

.bubble{
  border-radius:var(--r-lg);
  padding:var(--sp-3) var(--sp-4);
  font-size:15.5px; line-height:1.6;
  white-space:pre-wrap; word-break:break-word;
  max-width:80%;
}
.msg-group.ai .bubble{
  max-width:88%;
  background:var(--surface); border:1px solid var(--border); color:var(--text);
}
.msg-group.user .bubble{
  background:var(--text); color:var(--bg);
}
.bubble.error-bubble{ color:var(--danger); background:var(--danger-bg); border-color:var(--danger-bg); }

.cursor{
  display:inline-block; width:2px; height:1em; vertical-align:middle;
  background:currentColor; margin-left:1px; opacity:0.6; animation:blink 1s steps(1) infinite;
}
@keyframes blink{ 50%{ opacity:0; } }

.voice-bar{
  display:flex; align-items:center; gap:var(--sp-3);
  background:var(--bg); border:1px solid var(--border); border-radius:var(--r-md);
  padding:var(--sp-2) var(--sp-3); margin-top:var(--sp-2); max-width:88%;
}
.voice-play{
  width:26px; height:26px; border-radius:50%; flex-shrink:0;
  background:var(--accent); color:var(--on-accent); border:none;
  display:flex; align-items:center; justify-content:center;
}
.voice-wave{ flex:1; height:16px; display:flex; align-items:center; gap:2px; }
.voice-wave span{ width:2px; background:var(--border-strong); border-radius:1px; }
.voice-duration{ font-size:11px; color:var(--text-faint); flex-shrink:0; }

.action-row{ display:flex; align-items:center; gap:var(--sp-4); margin-top:var(--sp-2); padding:0 var(--sp-1); }
.msg-group.user .action-row{ justify-content:flex-end; }
.msg-group.ai .action-row{ justify-content:space-between; width:100%; max-width:88%; }
.action-icons{ display:flex; align-items:center; gap:var(--sp-4); }
.action-row button{
  background:none; border:none; padding:2px; color:var(--text-faint);
  display:flex; align-items:center; justify-content:center;
  transition:color .15s ease;
}
.action-row button:hover{ color:var(--text-muted); }
.msg-tokens{ font-size:11px; color:var(--text-faint); white-space:nowrap; }

/* ---------- input bar ---------- */
#inputBar{
  flex:0 0 auto;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:var(--sp-4) var(--sp-5) 0;
}
.input-shell{
  background:var(--bg); border:1px solid var(--border); border-radius:var(--r-lg);
  padding:var(--sp-3) var(--sp-4);
}
#input{
  width:100%; border:none; outline:none; resize:none;
  background:transparent; font-size:15px; font-family:inherit;
  line-height:1.4; max-height:100px; color:var(--text);
}
#input::placeholder{ color:var(--text-faint); }
.toolbar-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:var(--sp-3) var(--sp-1) var(--sp-3);
}
.toolbar-left{ display:flex; align-items:center; gap:var(--sp-4); min-width:0; }
.tool-icon{ background:none; border:none; color:var(--text-faint); padding:2px; display:flex; align-items:center; transition:color .15s ease; }
.tool-icon:hover{ color:var(--text-muted); }
.model-name{ font-size:12px; color:var(--text-faint); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.toolbar-right{ display:flex; align-items:center; gap:var(--sp-3); flex-shrink:0; }
.tool-icon-circle{
  width:34px; height:34px; border-radius:50%; border:1px solid var(--border-strong);
  background:none; color:var(--text-faint); display:flex; align-items:center; justify-content:center;
  transition:color .15s ease, border-color .15s ease;
}
.tool-icon-circle:hover{ color:var(--text); border-color:var(--text-faint); }
.send-btn{
  width:36px; height:36px; border-radius:50%; border:none;
  background:var(--accent);
  color:var(--on-accent); display:flex; align-items:center; justify-content:center;
  transition:background .15s ease, opacity .15s ease;
}
.send-btn:hover{ background:var(--accent-strong); }
.send-btn:disabled{ opacity:0.4; }
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <button id="backBtn" class="icon-btn" aria-label="返回"></button>
    <div class="title-block">
      <div class="title-name" id="aiName"></div>
      <div class="title-sub" id="titleSub"></div>
    </div>
    <button id="musicBtn" class="icon-btn" aria-label="音乐"></button>
    <div class="token-chip">
      <div id="topTokens">0</div>
      <div class="token-label">tokens</div>
    </div>
  </header>

  <main id="messages"></main>

  <footer id="inputBar">
    <div class="input-shell">
      <textarea id="input" rows="1" placeholder="输入信息"></textarea>
    </div>
    <div class="toolbar-row">
      <div class="toolbar-left">
        <button class="tool-icon" id="attachBtn" aria-label="附件"></button>
        <button class="tool-icon" id="emojiBtn" aria-label="表情"></button>
        <button class="tool-icon" id="micBtn" aria-label="麦克风"></button>
        <span class="model-name" id="modelName"></span>
      </div>
      <div class="toolbar-right">
        <button class="tool-icon-circle" id="phoneBtn" aria-label="电话"></button>
        <button id="sendBtn" class="send-btn" aria-label="发送"></button>
      </div>
    </div>
  </footer>
</div>

<script>
'use strict';

const CONFIG = {
  aiName: '小舟',
  userName: '你',
  startDate: '2026-07-18',
  modelLabel: 'claude-sonnet-4-6',
  apiPorts: [8000, 8001],
};

const ICONS = {
  back: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>',
  note: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
  send: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M3 11.5L21 3l-8.5 18-2.2-7.3L3 11.5z"/></svg>',
  phone: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.4 2.1L8.1 9.6a16 16 0 006.3 6.3l1.2-1.2a2 2 0 012.1-.4c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z"/></svg>',
  attach: '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21.4 11.1l-9 9a5 5 0 01-7-7l9-9a3.5 3.5 0 015 5l-9 9a2 2 0 01-3-3l8-8"/></svg>',
  emoji: '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2" stroke-linecap="round"/><line x1="9" y1="9" x2="9.01" y2="9" stroke-linecap="round" stroke-width="2.4"/><line x1="15" y1="9" x2="15.01" y2="9" stroke-linecap="round" stroke-width="2.4"/></svg>',
  mic: '<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>',
  copy: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>',
  redo: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.5 9A9 9 0 003.5 6.5L1 10M3.5 15a9 9 0 0017 2.5L23 14"/></svg>',
  edit: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  more: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>',
  speaker: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7"/></svg>',
  translate: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h7M7.5 3v2M4 8c1.5 3 4 5 7 6M11 8c-1 3-3 5.5-7 7"/><path d="M14 21l4-9 4 9M15.3 18h5.4"/></svg>',
  play: '<svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M6 4l14 8-14 8V4z"/></svg>',
  gear: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',
  heart: '<svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.6l-1-1a5.5 5.5 0 00-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>',
  arrow:'<svg viewBox="0 0 24 24" width="9" height="9" fill="currentColor"><path d="M6 4l10 8-10 8V4z"/></svg>',
};

/* ---------- DOM refs ---------- */
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const topTokensEl = document.getElementById('topTokens');
const titleSubEl = document.getElementById('titleSub');

document.getElementById('backBtn').innerHTML = ICONS.back;
document.getElementById('musicBtn').innerHTML = ICONS.note;
document.getElementById('attachBtn').innerHTML = ICONS.attach;
document.getElementById('emojiBtn').innerHTML = ICONS.emoji;
document.getElementById('micBtn').innerHTML = ICONS.mic;
document.getElementById('phoneBtn').innerHTML = ICONS.phone;
sendBtn.innerHTML = ICONS.send;
document.getElementById('aiName').textContent = CONFIG.aiName;
document.getElementById('modelName').textContent = CONFIG.modelLabel;

/* ---------- state ---------- */
let sessionId = localStorage.getItem('xy_session_id') || null;
let apiPort = localStorage.getItem('xy_api_port') ? parseInt(localStorage.getItem('xy_api_port'), 10) : null;

/* Use whatever host this page was loaded from (PC LAN IP when opened from a phone,
   127.0.0.1 when opened as a local file) instead of hardcoding 127.0.0.1 — otherwise
   a phone browser would try to reach itself instead of the PC running the backend. */
const API_HOST = location.hostname || '127.0.0.1';

function computeDay(){
  const start = new Date(CONFIG.startDate + 'T00:00:00');
  const now = new Date();
  const diff = Math.floor((now - start) / 86400000) + 1;
  return Math.max(1, diff);
}
titleSubEl.innerHTML = ICONS.heart + `<span>第 ${computeDay()} 天</span>`;

async function resolveApiBase(){
  if (apiPort) return `http://${API_HOST}:${apiPort}`;
  for (const port of CONFIG.apiPorts) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 1200);
      const r = await fetch(`http://${API_HOST}:${port}/xy-health`, { signal: ctrl.signal });
      clearTimeout(timer);
      /* Other unrelated local services may already be squatting on 8000/8001 and
         answer any request (seen on this machine); only trust a port if it answers
         our own uniquely-named health route, not just "something answered". */
      const data = await r.json().catch(() => null);
      if (!data || data.app !== 'xy-backend') continue;
      apiPort = port;
      localStorage.setItem('xy_api_port', String(port));
      return `http://${API_HOST}:${port}`;
    } catch (e) { /* try next candidate */ }
  }
  apiPort = CONFIG.apiPorts[0];
  return `http://${API_HOST}:${apiPort}`;
}

/* ---------- small DOM helpers ---------- */
function el(tag, cls, text){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function formatTime(d){
  d = d || new Date();
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function scrollToBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }

function iconButton(iconKey, title){
  const btn = document.createElement('button');
  btn.innerHTML = ICONS[iconKey];
  btn.title = title;
  return btn;
}

function createAvatar(role){
  const a = el('div', 'avatar ' + role);
  a.textContent = role === 'ai' ? '舟' : '我';
  return a;
}

function createHeader(role, name){
  const header = el('div', 'msg-header');
  header.appendChild(createAvatar(role));
  const textWrap = el('div', 'header-text');
  textWrap.appendChild(el('div', 'name', name));
  textWrap.appendChild(el('div', 'time', formatTime()));
  header.appendChild(textWrap);
  return header;
}

/* ---------- quote block (UI placeholder, not wired to real logic) ---------- */
function renderQuote(container, opts){
  const q = el('div', 'quote ' + (opts.role === 'user' ? 'quote-user-style' : 'quote-ai-style'));
  q.appendChild(el('div', 'quote-name', opts.name));
  q.appendChild(el('div', 'quote-text', opts.text));
  container.appendChild(q);
  return q;
}

/* ---------- voice bar (UI placeholder, no real TTS wired) ---------- */
function formatDuration(s){
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}
function renderVoiceBar(container, seconds){
  const bar = el('div', 'voice-bar');
  const playBtn = el('button', 'voice-play');
  playBtn.innerHTML = ICONS.play;
  const wave = el('div', 'voice-wave');
  for (let i = 0; i < 26; i++) {
    const s = document.createElement('span');
    s.style.height = (4 + Math.round(Math.random() * 12)) + 'px';
    wave.appendChild(s);
  }
  bar.appendChild(playBtn);
  bar.appendChild(wave);
  bar.appendChild(el('span', 'voice-duration', formatDuration(seconds)));
  container.appendChild(bar);
  return bar;
}

/* ---------- thinking fold ---------- */
function createThinkingFold(){
  const root = el('div', 'thinking-fold');
  const toggle = el('div', 'thinking-toggle');
  const arrow = el('span', 'fold-arrow', '▸');
  const label = el('span', '', 'thinking');
  toggle.appendChild(arrow);
  toggle.appendChild(label);
  const body = el('div', 'thinking-body');
  root.appendChild(toggle);
  root.appendChild(body);
  toggle.addEventListener('click', () => root.classList.toggle('expanded'));
  return { root, setLabel(text){ label.textContent = text; }, body };
}

/* ---------- tool call fold ---------- */
function createToolFold(name){
  const root = el('div', 'tool-fold');
  const toggle = el('div', 'tool-toggle');
  const arrow = el('span', 'fold-arrow', '▸');
  const gearIcon = document.createElement('span');
  gearIcon.innerHTML = ICONS.gear;
  gearIcon.style.display = 'flex';
  const label = el('span', '');
  toggle.appendChild(arrow);
  toggle.appendChild(gearIcon);
  toggle.appendChild(label);
  const body = el('div', 'tool-body');
  const paramsPre = el('pre', 'tool-pre', '');
  const resultPre = el('pre', 'tool-pre', '等待中…');
  body.appendChild(el('div', 'tool-section-label', '参数'));
  body.appendChild(paramsPre);
  body.appendChild(el('div', 'tool-section-label', '结果'));
  body.appendChild(resultPre);
  root.appendChild(toggle);
  root.appendChild(body);
  toggle.addEventListener('click', () => root.classList.toggle('expanded'));

  function setStatus(status){ label.textContent = `${name} · ${status}`; }
  setStatus('进行中');

  return {
    root,
    setStatus,
    setParams(text){ paramsPre.textContent = text; },
    setResult(text){ resultPre.textContent = text; },
  };
}

/* ---------- message groups ---------- */
function createUserGroup(text){
  const group = el('div', 'msg-group user');
  group.appendChild(createHeader('user', CONFIG.userName));
  const bubble = el('div', 'bubble user-bubble', text);
  group.appendChild(bubble);
  const actions = el('div', 'action-row user-actions');
  actions.appendChild(iconButton('copy', '复制'));
  actions.appendChild(iconButton('redo', '重新生成'));
  actions.appendChild(iconButton('edit', '编辑'));
  actions.appendChild(iconButton('more', '更多'));
  group.appendChild(actions);
  messagesEl.appendChild(group);
  return group;
}

function createAiGroup(){
  const group = el('div', 'msg-group ai');
  group.appendChild(createHeader('ai', CONFIG.aiName));
  const body = el('div', 'ai-body');
  group.appendChild(body);
  const actions = el('div', 'action-row ai-actions');
  const icons = el('div', 'action-icons');
  icons.appendChild(iconButton('copy', '复制'));
  icons.appendChild(iconButton('redo', '重新生成'));
  icons.appendChild(iconButton('speaker', '朗读'));
  icons.appendChild(iconButton('translate', '翻译'));
  icons.appendChild(iconButton('more', '更多'));
  const tokenSpan = el('span', 'msg-tokens', '');
  actions.appendChild(icons);
  actions.appendChild(tokenSpan);
  group.appendChild(actions);
  messagesEl.appendChild(group);
  return { group, body, tokenSpan };
}

/* ---------- streaming ---------- */
function insertTextBeforeCursor(bubble, text){
  const cursor = bubble.querySelector('.cursor');
  const node = document.createTextNode(text);
  if (cursor) bubble.insertBefore(node, cursor); else bubble.appendChild(node);
  scrollToBottom();
}

function handleEvent(data, ai, state){
  if (data.session_id) {
    sessionId = data.session_id;
    localStorage.setItem('xy_session_id', sessionId);
  }

  if (data.type === 'stream_event' && data.event) {
    const ev = data.event;

    if (ev.type === 'message_start') {
      state.turnEl = el('div', 'ai-turn');
      ai.body.appendChild(state.turnEl);
      state.blocks = {};
      return;
    }

    if (ev.type === 'content_block_start') {
      const idx = ev.index;
      const cb = ev.content_block;
      if (!cb || !state.turnEl) return;

      if (cb.type === 'thinking') {
        const fold = createThinkingFold();
        state.turnEl.appendChild(fold.root);
        state.blocks[idx] = { kind: 'thinking', fold, start: performance.now(), text: '' };
      } else if (cb.type === 'tool_use') {
        const fold = createToolFold(cb.name || '工具');
        state.turnEl.appendChild(fold.root);
        const entry = { kind: 'tool_use', fold, jsonBuf: '' };
        state.blocks[idx] = entry;
        if (cb.id) state.toolsById[cb.id] = entry;
      } else if (cb.type === 'text') {
        if (!state.textBubble) {
          state.textBubble = el('div', 'bubble ai-bubble');
          state.textBubble.appendChild(el('span', 'cursor'));
          state.turnEl.appendChild(state.textBubble);
        }
        state.blocks[idx] = { kind: 'text' };
      }
      return;
    }

    if (ev.type === 'content_block_delta') {
      const b = state.blocks[ev.index];
      const delta = ev.delta;
      if (!b || !delta) return;
      if (b.kind === 'thinking' && delta.type === 'thinking_delta') {
        b.text += (delta.thinking || '');
        b.fold.body.textContent = b.text;
      } else if (b.kind === 'text' && delta.type === 'text_delta') {
        insertTextBeforeCursor(state.textBubble, delta.text || '');
      } else if (b.kind === 'tool_use' && delta.type === 'input_json_delta') {
        b.jsonBuf += (delta.partial_json || '');
      }
      return;
    }

    if (ev.type === 'content_block_stop') {
      const b = state.blocks[ev.index];
      if (!b) return;
      if (b.kind === 'thinking') {
        const secs = ((performance.now() - b.start) / 1000).toFixed(1);
        b.fold.setLabel(`thinking · ${secs}s`);
      } else if (b.kind === 'tool_use') {
        let text = b.jsonBuf;
        try { text = JSON.stringify(JSON.parse(b.jsonBuf || '{}'), null, 2); } catch (e) { /* keep raw */ }
        b.fold.setParams(text);
      }
      return;
    }
    return;
  }

  if (data.type === 'user' && data.message && Array.isArray(data.message.content)) {
    for (const block of data.message.content) {
      if (block.type === 'tool_result' && block.tool_use_id) {
        const entry = state.toolsById[block.tool_use_id];
        if (entry) {
          let result = block.content;
          if (typeof result !== 'string') result = JSON.stringify(result, null, 2);
          entry.fold.setResult(result);
          entry.fold.setStatus('完成');
        }
      }
    }
    return;
  }

  if (data.type === 'result') {
    const u = data.usage || {};
    const total = (u.input_tokens || 0) + (u.output_tokens || 0) +
                  (u.cache_read_input_tokens || 0) + (u.cache_creation_input_tokens || 0);
    topTokensEl.textContent = total.toLocaleString();
    ai.tokenSpan.textContent = total.toLocaleString() + ' tokens';
    return;
  }

  if (data.type === 'error') {
    const bubble = el('div', 'bubble ai-bubble error-bubble', data.error || '发生错误');
    (state.turnEl || ai.body).appendChild(bubble);
    return;
  }

  if (data.type === 'done') {
    if (state.textBubble) {
      const cursor = state.textBubble.querySelector('.cursor');
      if (cursor) cursor.remove();
    }
    scrollToBottom();
    return;
  }
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  createUserGroup(text);
  const ai = createAiGroup();
  scrollToBottom();

  const state = { turnEl: null, blocks: {}, toolsById: {}, textBubble: null };

  try {
    const base = await resolveApiBase();
    const resp = await fetch(base + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });
    if (!resp.body) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const jsonStr = line.slice(5).trim();
        let data;
        try { data = JSON.parse(jsonStr); } catch (e) { continue; }
        handleEvent(data, ai, state);
      }
    }
  } catch (err) {
    const bubble = el('div', 'bubble ai-bubble error-bubble', '请求失败：' + err.message);
    ai.body.appendChild(bubble);
  } finally {
    sendBtn.disabled = false;
    scrollToBottom();
  }
}

/* ---------- input behaviour ---------- */
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);
</script>
