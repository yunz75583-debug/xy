<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>xy chat</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .row {
    display: flex;
  }
  .row.user { justify-content: flex-end; }
  .row.ai { justify-content: flex-start; }
  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 10px;
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
  }
  .row.user .bubble {
    background: #2563eb;
    color: #fff;
  }
  .row.ai .bubble {
    background: #fff;
    color: #111;
    border: 1px solid #e0e0e0;
  }
  .row.ai .bubble.error {
    background: #fee2e2;
    color: #991b1b;
    border-color: #fca5a5;
  }
  #inputBar {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid #ddd;
    background: #fff;
  }
  #input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
    resize: none;
  }
  #send {
    padding: 0 20px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }
  #send:disabled {
    background: #93b4f0;
    cursor: not-allowed;
  }
</style>
</head>
<body>
<div id="app">
  <div id="messages"></div>
  <div id="inputBar">
    <textarea id="input" rows="1" placeholder="输入消息..."></textarea>
    <button id="send">发送</button>
  </div>
</div>

<script>
const API_URL = "http://127.0.0.1:8000/chat";

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendEl = document.getElementById("send");

let sessionId = localStorage.getItem("xy_session_id") || null;

function addRow(role) {
  const row = document.createElement("div");
  row.className = "row " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function extractText(message) {
  if (!message || !Array.isArray(message.content)) return "";
  return message.content
    .filter((b) => b.type === "text")
    .map((b) => b.text)
    .join("");
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";
  sendEl.disabled = true;

  addRow("user").textContent = text;
  const aiBubble = addRow("ai");
  aiBubble.textContent = "";

  try {
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buffer = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const parts = buffer.split("\n\n");
      buffer = parts.pop();

      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith("data:")) continue;
        const jsonStr = line.slice(5).trim();
        let data;
        try {
          data = JSON.parse(jsonStr);
        } catch (e) {
          continue;
        }
        handleEvent(data, aiBubble);
      }
    }
  } catch (err) {
    aiBubble.classList.add("error");
    aiBubble.textContent = "请求失败：" + err.message;
  } finally {
    sendEl.disabled = false;
  }
}

function handleEvent(data, aiBubble) {
  if (data.session_id) {
    sessionId = data.session_id;
    localStorage.setItem("xy_session_id", sessionId);
  }

  if (data.type === "stream_event" && data.event) {
    const ev = data.event;
    if (ev.type === "content_block_delta" && ev.delta && ev.delta.type === "text_delta") {
      aiBubble.textContent += ev.delta.text;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  } else if (data.type === "assistant" && data.message) {
    const text = extractText(data.message);
    if (text) {
      aiBubble.textContent = text;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  } else if (data.type === "error") {
    aiBubble.classList.add("error");
    aiBubble.textContent = data.error || "发生错误";
  }
}

sendEl.addEventListener("click", sendMessage);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
