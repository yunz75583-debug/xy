<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>小舟</title>
<style>
:root{
  --separator:#E5E5EA;
  --input-bg:#F2F2F7;
  --dark:#1C1C1E;
  --text-secondary:#8E8E93;
  --accent:#007AFF;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{
  margin:0; padding:0; height:100vh; width:100%;
  overflow:hidden; overscroll-behavior:none;
  background:#ffffff;
  color:var(--dark);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
}
button{ font-family:inherit; cursor:pointer; }

body{ display:flex; align-items:center; justify-content:center; }

#app{
  height:100vh; width:100%;
  display:flex; flex-direction:column;
  position:relative; overflow:hidden;
  background:#ffffff;
}

@media (min-width:701px){
  #app{
    max-width:480px;
    height:min(880px, 94vh);
    margin:24px 0;
    border-radius:20px;
    box-shadow:0 24px 60px -18px rgba(0,0,0,0.22);
    overflow:hidden;
  }
}

/* ---------- sidebar ---------- */
.sidebar-overlay{
  position:absolute; inset:0; background:rgba(0,0,0,0.25);
  z-index:29; opacity:0; pointer-events:none; transition:opacity .25s ease;
}
.sidebar-overlay.open{ opacity:1; pointer-events:auto; }
.sidebar{
  position:absolute; top:0; left:0; height:100%; width:78%; max-width:280px;
  background:#ffffff; z-index:30;
  transform:translateX(-100%); transition:transform .25s ease;
  box-shadow:2px 0 24px rgba(0,0,0,0.08);
  display:flex; flex-direction:column;
}
.sidebar.open{ transform:translateX(0); }
.sidebar-header{
  height:44px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; border-bottom:1px solid var(--separator);
}
.sidebar-title{ font-size:16px; font-weight:500; }
.sidebar-body{ padding:8px; overflow-y:auto; }
.sidebar-item{
  padding:10px 12px; border-radius:10px; font-size:14px; color:var(--dark);
}
.sidebar-item.active{ background:var(--input-bg); font-weight:500; }
.sidebar-empty{ padding:16px 12px; font-size:12px; color:var(--text-secondary); }

/* ---------- top bar ---------- */
#topbar{
  flex:0 0 auto;
  height:44px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 12px;
  border-bottom:1px solid var(--separator);
  padding-top:env(safe-area-inset-top);
}
.bar-btn{
  width:32px; height:32px; border-radius:8px; flex-shrink:0;
  background:none; border:none; color:var(--dark);
  display:flex; align-items:center; justify-content:center;
}
.title-block{
  flex:1; min-width:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  line-height:1.2;
}
.title-name{
  font-size:16px; font-weight:500; color:var(--dark);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.title-sub{
  font-size:11px; color:var(--text-secondary); margin-top:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%;
}
.right-group{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
.token-text{ font-size:12px; color:var(--text-secondary); white-space:nowrap; }

/* ---------- message list ---------- */
#messages{
  flex:1 1 auto;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:14px 12px;
  background:#ffffff;
}

.msg-group{ margin-bottom:16px; }
.msg-meta{ display:flex; align-items:baseline; gap:6px; margin-bottom:3px; padding:0 44px; }
.msg-group.ai .msg-meta{ justify-content:flex-start; }
.msg-group.user .msg-meta{ justify-content:flex-end; }
.msg-name{ font-size:12px; color:var(--text-secondary); font-weight:500; }
.msg-time{ font-size:12px; color:var(--text-secondary); }

.thinking-fold{ padding:0 44px; margin-bottom:4px; }
.msg-group.user .thinking-fold{ display:none; }
.thinking-toggle{
  font-size:12px; color:var(--text-secondary); cursor:pointer; user-select:none;
  display:flex; align-items:center; gap:4px;
}
.thinking-toggle .fold-arrow{ font-size:9px; display:inline-block; transition:transform .15s ease; }
.thinking-fold.expanded .fold-arrow{ transform:rotate(90deg); }
.thinking-body{
  display:none; margin-top:4px; padding:8px 10px;
  background:var(--input-bg); border-radius:10px;
  font-size:12px; line-height:1.55; color:var(--text-secondary); white-space:pre-wrap;
}
.thinking-fold.expanded .thinking-body{ display:block; }

.tool-fold{
  margin:0 44px 4px;
  background:var(--input-bg); border-radius:10px;
  padding:8px 11px;
}
.tool-toggle{
  display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;
  font-size:12px; color:var(--text-secondary);
}
.tool-toggle svg{ flex-shrink:0; }
.tool-fold.expanded .fold-arrow{ transform:rotate(90deg); }
.tool-body{ display:none; margin-top:6px; }
.tool-fold.expanded .tool-body{ display:block; }
.tool-section-label{ font-size:10px; color:var(--text-secondary); font-weight:600; margin:5px 0 2px; }
.tool-pre{
  background:#ffffff; border-radius:8px; padding:7px 9px; margin:0;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:11px; line-height:1.5; color:var(--dark);
  white-space:pre-wrap; word-break:break-word;
  max-height:200px; overflow-y:auto;
}

.msg-row{ display:flex; align-items:flex-end; gap:8px; }
.msg-group.user .msg-row{ flex-direction:row-reverse; }

.avatar{
  width:36px; height:36px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:600;
}
.avatar.ai{ background:var(--input-bg); color:var(--dark); }
.avatar.user{ background:var(--dark); color:#ffffff; }

.bubble{
  border-radius:18px;
  padding:10px 14px;
  font-size:15px; font-weight:400; line-height:1.5;
  white-space:pre-wrap; word-break:break-word;
  max-width:calc(100% - 100px);
}
.msg-group.ai .bubble{ background:#ffffff; border:1px solid var(--separator); color:var(--dark); }
.msg-group.user .bubble{ background:var(--dark); color:#ffffff; }
.bubble.error-bubble{ color:#B3261E; background:#FBEAE9; border-color:#FBEAE9; }

.cursor{
  display:inline-block; width:2px; height:1em; vertical-align:middle;
  background:currentColor; margin-left:1px; opacity:0.6; animation:blink 1s steps(1) infinite;
}
@keyframes blink{ 50%{ opacity:0; } }

.voice-bar{
  display:flex; align-items:center; gap:10px;
  background:var(--input-bg); border-radius:12px;
  padding:7px 12px; margin-top:6px; max-width:calc(100% - 100px);
}
.voice-play{
  width:26px; height:26px; border-radius:50%; flex-shrink:0;
  background:var(--accent); color:#fff; border:none;
  display:flex; align-items:center; justify-content:center;
}
.voice-wave{ flex:1; height:16px; display:flex; align-items:center; gap:2px; }
.voice-wave span{ width:2px; background:#C7C7CC; border-radius:1px; }
.voice-duration{ font-size:11px; color:var(--text-secondary); flex-shrink:0; }

.quote{ max-width:calc(100% - 100px); border-radius:10px; padding:7px 11px; margin-bottom:4px; }
.quote-name{ font-size:11px; font-weight:700; margin-bottom:2px; }
.quote-text{
  font-size:12px; color:var(--text-secondary);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.quote-user-style{ background:#fff; border:1px solid var(--separator); border-left:3px solid var(--dark); }
.quote-ai-style{ background:var(--input-bg); border-left:3px solid var(--accent); }
.quote-ai-style .quote-name{ color:var(--accent); }
.quote-user-style .quote-name{ color:var(--dark); }

.action-row{ display:flex; align-items:center; gap:16px; margin-top:6px; padding:0 44px; }
.msg-group.user .action-row{ justify-content:flex-end; }
.msg-group.ai .action-row{ justify-content:flex-start; }
.action-row button{
  background:none; border:none; padding:2px; color:var(--text-secondary);
  display:flex; align-items:center; justify-content:center;
}

/* ---------- input bar ---------- */
#inputBar{
  flex:0 0 auto;
  height:56px;
  background:#ffffff;
  border-top:1px solid var(--separator);
  display:flex; align-items:center;
  gap:6px;
  padding:0 10px;
}
.plus-btn, .input-icon-btn, .send-btn, .phone-btn-sm{
  flex-shrink:0; border:none; background:none; color:var(--dark);
  display:flex; align-items:center; justify-content:center;
}
.plus-btn{ width:26px; height:26px; }
.input-icon-btn{ width:24px; height:24px; color:var(--text-secondary); }
.phone-btn-sm{ width:26px; height:26px; color:var(--text-secondary); }
.input-shell{
  flex:1 1 auto; min-width:0;
  height:36px;
  background:var(--input-bg);
  border-radius:20px;
  display:flex; align-items:center;
  padding:0 14px;
}
#input{
  width:100%; border:none; outline:none;
  background:transparent; font-size:15px; font-family:inherit;
  color:var(--dark);
}
#input::placeholder{ color:var(--text-secondary); }
.model-name{
  font-size:11px; color:var(--text-secondary); flex-shrink:0;
  max-width:52px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.send-btn{
  width:30px; height:30px; border-radius:50%;
  background:var(--accent); color:#fff;
}
.send-btn:disabled{ opacity:0.4; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">对话</span>
      <button id="sidebarClose" class="bar-btn" aria-label="关闭"></button>
    </div>
    <div class="sidebar-body">
      <div class="sidebar-item active" id="aiNameSidebar"></div>
      <div class="sidebar-empty">对话历史（占位，暂未接入）</div>
    </div>
  </aside>

  <header id="topbar">
    <button id="menuBtn" class="bar-btn" aria-label="菜单"></button>
    <div class="title-block">
      <div class="title-name" id="aiName"></div>
      <div class="title-sub" id="titleSub"></div>
    </div>
    <div class="right-group">
      <button id="phoneBtnTop" class="bar-btn" aria-label="电话"></button>
      <span class="token-text" id="topTokens">Tokens 0000</span>
    </div>
  </header>

  <main id="messages"></main>

  <footer id="inputBar">
    <button id="plusBtn" class="plus-btn" aria-label="更多"></button>
    <div class="input-shell">
      <input id="input" type="text" placeholder="输入信息" autocomplete="off">
    </div>
    <button id="attachBtn" class="input-icon-btn" aria-label="附件"></button>
    <button id="emojiBtn" class="input-icon-btn" aria-label="表情"></button>
    <button id="micBtn" class="input-icon-btn" aria-label="麦克风"></button>
    <span class="model-name" id="modelName"></span>
    <button id="phoneBtn" class="phone-btn-sm" aria-label="电话"></button>
    <button id="sendBtn" class="send-btn" aria-label="发送"></button>
  </footer>
</div>

<script>
'use strict';

const CONFIG = {
  aiName: '小舟',
  userName: '你',
  moodStatus: '心情平静', // 占位：无真实心情数据源，先用静态文案
  modelLabel: 'claude-sonnet-4-6',
  apiPorts: [8000, 8001],
};

const ICONS = {
  menu: '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>',
  close: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>',
  phone: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.6a2 2 0 01-.4 2.1L8.1 9.6a16 16 0 006.3 6.3l1.2-1.2a2 2 0 012.1-.4c.8.3 1.7.5 2.6.6a2 2 0 011.7 2z"/></svg>',
  plus: '<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  attach: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21.4 11.1l-9 9a5 5 0 01-7-7l9-9a3.5 3.5 0 015 5l-9 9a2 2 0 01-3-3l8-8"/></svg>',
  emoji: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M8 14s1.5 2 4 2 4-2 4-2" stroke-linecap="round"/><line x1="9" y1="9" x2="9.01" y2="9" stroke-linecap="round" stroke-width="2.4"/><line x1="15" y1="9" x2="15.01" y2="9" stroke-linecap="round" stroke-width="2.4"/></svg>',
  mic: '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>',
  send: '<svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M3 11.5L21 3l-8.5 18-2.2-7.3L3 11.5z"/></svg>',
  copy: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>',
  redo: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.5 9A9 9 0 003.5 6.5L1 10M3.5 15a9 9 0 0017 2.5L23 14"/></svg>',
  translate: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h7M7.5 3v2M4 8c1.5 3 4 5 7 6M11 8c-1 3-3 5.5-7 7"/><path d="M14 21l4-9 4 9M15.3 18h5.4"/></svg>',
  voice: '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 010 7"/></svg>',
  more: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>',
  play: '<svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M6 4l14 8-14 8V4z"/></svg>',
  gear: '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>',
};

/* ---------- DOM refs ---------- */
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const topTokensEl = document.getElementById('topTokens');
const titleSubEl = document.getElementById('titleSub');
const sidebar = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebarOverlay');

document.getElementById('menuBtn').innerHTML = ICONS.menu;
document.getElementById('sidebarClose').innerHTML = ICONS.close;
document.getElementById('phoneBtnTop').innerHTML = ICONS.phone;
document.getElementById('plusBtn').innerHTML = ICONS.plus;
document.getElementById('attachBtn').innerHTML = ICONS.attach;
document.getElementById('emojiBtn').innerHTML = ICONS.emoji;
document.getElementById('micBtn').innerHTML = ICONS.mic;
document.getElementById('phoneBtn').innerHTML = ICONS.phone;
sendBtn.innerHTML = ICONS.send;
document.getElementById('aiName').textContent = CONFIG.aiName;
document.getElementById('aiNameSidebar').textContent = CONFIG.aiName;
document.getElementById('modelName').textContent = CONFIG.modelLabel;
titleSubEl.textContent = CONFIG.moodStatus;

function openSidebar(){ sidebar.classList.add('open'); sidebarOverlay.classList.add('open'); }
function closeSidebar(){ sidebar.classList.remove('open'); sidebarOverlay.classList.remove('open'); }
document.getElementById('menuBtn').addEventListener('click', openSidebar);
document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

/* ---------- state ---------- */
let sessionId = localStorage.getItem('xy_session_id') || null;
let apiPort = localStorage.getItem('xy_api_port') ? parseInt(localStorage.getItem('xy_api_port'), 10) : null;

/* Use whatever host this page was loaded from (PC LAN IP when opened from a phone,
   127.0.0.1 when opened as a local file) instead of hardcoding 127.0.0.1 — otherwise
   a phone browser would try to reach itself instead of the PC running the backend. */
const API_HOST = location.hostname || '127.0.0.1';

async function resolveApiBase(){
  if (apiPort) return `http://${API_HOST}:${apiPort}`;
  for (const port of CONFIG.apiPorts) {
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 1200);
      const r = await fetch(`http://${API_HOST}:${port}/xy-health`, { signal: ctrl.signal });
      clearTimeout(timer);
      /* Other unrelated local services may already be squatting on 8000/8001 and
         answer any request (seen on this machine); only trust a port if it answers
         our own uniquely-named health route, not just "something answered". */
      const data = await r.json().catch(() => null);
      if (!data || data.app !== 'xy-backend') continue;
      apiPort = port;
      localStorage.setItem('xy_api_port', String(port));
      return `http://${API_HOST}:${port}`;
    } catch (e) { /* try next candidate */ }
  }
  apiPort = CONFIG.apiPorts[0];
  return `http://${API_HOST}:${apiPort}`;
}

/* ---------- small DOM helpers ---------- */
function el(tag, cls, text){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function formatHM(d){
  d = d || new Date();
  const p = n => String(n).padStart(2, '0');
  return `${p(d.getHours())}:${p(d.getMinutes())}`;
}

function scrollToBottom(){ messagesEl.scrollTop = messagesEl.scrollHeight; }

function iconButton(iconKey, title){
  const btn = document.createElement('button');
  btn.innerHTML = ICONS[iconKey];
  btn.title = title;
  return btn;
}

/* ---------- quote block (UI placeholder, not wired to real logic) ---------- */
function renderQuote(container, opts){
  const q = el('div', 'quote ' + (opts.role === 'user' ? 'quote-user-style' : 'quote-ai-style'));
  q.appendChild(el('div', 'quote-name', opts.name));
  q.appendChild(el('div', 'quote-text', opts.text));
  container.appendChild(q);
  return q;
}

/* ---------- voice bar (UI placeholder, no real TTS wired) ---------- */
function formatDuration(s){
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}
function renderVoiceBar(container, seconds){
  const bar = el('div', 'voice-bar');
  const playBtn = el('button', 'voice-play');
  playBtn.innerHTML = ICONS.play;
  const wave = el('div', 'voice-wave');
  for (let i = 0; i < 26; i++) {
    const s = document.createElement('span');
    s.style.height = (4 + Math.round(Math.random() * 12)) + 'px';
    wave.appendChild(s);
  }
  bar.appendChild(playBtn);
  bar.appendChild(wave);
  bar.appendChild(el('span', 'voice-duration', formatDuration(seconds)));
  container.appendChild(bar);
  return bar;
}

/* ---------- thinking fold ---------- */
function createThinkingFold(){
  const root = el('div', 'thinking-fold');
  const toggle = el('div', 'thinking-toggle');
  const arrow = el('span', 'fold-arrow', '▸');
  const label = el('span', '', '· thinking');
  toggle.appendChild(arrow);
  toggle.appendChild(label);
  const body = el('div', 'thinking-body');
  root.appendChild(toggle);
  root.appendChild(body);
  toggle.addEventListener('click', () => root.classList.toggle('expanded'));
  return { root, setLabel(text){ label.textContent = text; }, body };
}

/* ---------- tool call fold ---------- */
function createToolFold(name){
  const root = el('div', 'tool-fold');
  const toggle = el('div', 'tool-toggle');
  const arrow = el('span', 'fold-arrow', '▸');
  const gearIcon = document.createElement('span');
  gearIcon.innerHTML = ICONS.gear;
  gearIcon.style.display = 'flex';
  const label = el('span', '');
  toggle.appendChild(arrow);
  toggle.appendChild(gearIcon);
  toggle.appendChild(label);
  const body = el('div', 'tool-body');
  const paramsPre = el('pre', 'tool-pre', '');
  const resultPre = el('pre', 'tool-pre', '等待中…');
  body.appendChild(el('div', 'tool-section-label', '参数'));
  body.appendChild(paramsPre);
  body.appendChild(el('div', 'tool-section-label', '结果'));
  body.appendChild(resultPre);
  root.appendChild(toggle);
  root.appendChild(body);
  toggle.addEventListener('click', () => root.classList.toggle('expanded'));

  function setStatus(status){ label.textContent = `${name} · ${status}`; }
  setStatus('进行中');

  return {
    root,
    setStatus,
    setParams(text){ paramsPre.textContent = text; },
    setResult(text){ resultPre.textContent = text; },
  };
}

/* ---------- message groups ---------- */
function createUserGroup(text){
  const group = el('div', 'msg-group user');

  const meta = el('div', 'msg-meta');
  meta.appendChild(el('span', 'msg-name', CONFIG.userName));
  meta.appendChild(el('span', 'msg-time', formatHM()));
  group.appendChild(meta);

  const row = el('div', 'msg-row');
  const avatar = el('div', 'avatar user', '我');
  const bubble = el('div', 'bubble user-bubble', text);
  row.appendChild(avatar);
  row.appendChild(bubble);
  group.appendChild(row);

  const actions = el('div', 'action-row user-actions');
  actions.appendChild(iconButton('copy', '复制'));
  actions.appendChild(iconButton('redo', '重发'));
  actions.appendChild(iconButton('translate', '翻译'));
  actions.appendChild(iconButton('voice', '语音'));
  actions.appendChild(iconButton('more', '更多'));
  group.appendChild(actions);

  messagesEl.appendChild(group);
  return group;
}

function createAiGroup(){
  const group = el('div', 'msg-group ai');

  const meta = el('div', 'msg-meta');
  meta.appendChild(el('span', 'msg-name', CONFIG.aiName));
  meta.appendChild(el('span', 'msg-time', formatHM()));
  group.appendChild(meta);

  const body = el('div', 'ai-body');
  group.appendChild(body);

  const row = el('div', 'msg-row');
  const avatar = el('div', 'avatar ai', '舟');
  const bubbleWrap = el('div', 'ai-bubble-wrap');
  bubbleWrap.style.display = 'flex';
  bubbleWrap.style.flexDirection = 'column';
  row.appendChild(avatar);
  row.appendChild(bubbleWrap);
  group.appendChild(row);

  const actions = el('div', 'action-row ai-actions');
  actions.appendChild(iconButton('copy', '复制'));
  actions.appendChild(iconButton('redo', '重发'));
  actions.appendChild(iconButton('translate', '翻译'));
  actions.appendChild(iconButton('voice', '语音'));
  actions.appendChild(iconButton('more', '更多'));
  group.appendChild(actions);

  messagesEl.appendChild(group);
  return { group, body, bubbleWrap };
}

/* ---------- streaming ---------- */
function insertTextBeforeCursor(bubble, text){
  const cursor = bubble.querySelector('.cursor');
  const node = document.createTextNode(text);
  if (cursor) bubble.insertBefore(node, cursor); else bubble.appendChild(node);
  scrollToBottom();
}

function handleEvent(data, ai, state){
  if (data.session_id) {
    sessionId = data.session_id;
    localStorage.setItem('xy_session_id', sessionId);
  }

  if (data.type === 'stream_event' && data.event) {
    const ev = data.event;

    if (ev.type === 'message_start') {
      state.blocks = {};
      return;
    }

    if (ev.type === 'content_block_start') {
      const idx = ev.index;
      const cb = ev.content_block;
      if (!cb) return;

      if (cb.type === 'thinking') {
        const fold = createThinkingFold();
        ai.body.appendChild(fold.root);
        state.blocks[idx] = { kind: 'thinking', fold, start: performance.now(), text: '' };
      } else if (cb.type === 'tool_use') {
        const fold = createToolFold(cb.name || '工具');
        ai.body.appendChild(fold.root);
        const entry = { kind: 'tool_use', fold, jsonBuf: '' };
        state.blocks[idx] = entry;
        if (cb.id) state.toolsById[cb.id] = entry;
      } else if (cb.type === 'text') {
        if (!state.textBubble) {
          state.textBubble = el('div', 'bubble ai-bubble');
          state.textBubble.appendChild(el('span', 'cursor'));
          ai.bubbleWrap.appendChild(state.textBubble);
        }
        state.blocks[idx] = { kind: 'text' };
      }
      return;
    }

    if (ev.type === 'content_block_delta') {
      const b = state.blocks[ev.index];
      const delta = ev.delta;
      if (!b || !delta) return;
      if (b.kind === 'thinking' && delta.type === 'thinking_delta') {
        b.text += (delta.thinking || '');
        b.fold.body.textContent = b.text;
      } else if (b.kind === 'text' && delta.type === 'text_delta') {
        insertTextBeforeCursor(state.textBubble, delta.text || '');
      } else if (b.kind === 'tool_use' && delta.type === 'input_json_delta') {
        b.jsonBuf += (delta.partial_json || '');
      }
      return;
    }

    if (ev.type === 'content_block_stop') {
      const b = state.blocks[ev.index];
      if (!b) return;
      if (b.kind === 'thinking') {
        const secs = ((performance.now() - b.start) / 1000).toFixed(1);
        b.fold.setLabel(`· thinking · ${secs}s`);
      } else if (b.kind === 'tool_use') {
        let text = b.jsonBuf;
        try { text = JSON.stringify(JSON.parse(b.jsonBuf || '{}'), null, 2); } catch (e) { /* keep raw */ }
        b.fold.setParams(text);
      }
      return;
    }
    return;
  }

  if (data.type === 'user' && data.message && Array.isArray(data.message.content)) {
    for (const block of data.message.content) {
      if (block.type === 'tool_result' && block.tool_use_id) {
        const entry = state.toolsById[block.tool_use_id];
        if (entry) {
          let result = block.content;
          if (typeof result !== 'string') result = JSON.stringify(result, null, 2);
          entry.fold.setResult(result);
          entry.fold.setStatus('完成');
        }
      }
    }
    return;
  }

  if (data.type === 'result') {
    const u = data.usage || {};
    const total = (u.input_tokens || 0) + (u.output_tokens || 0) +
                  (u.cache_read_input_tokens || 0) + (u.cache_creation_input_tokens || 0);
    topTokensEl.textContent = 'Tokens ' + String(total).padStart(4, '0');
    return;
  }

  if (data.type === 'error') {
    const bubble = el('div', 'bubble ai-bubble error-bubble', data.error || '发生错误');
    ai.bubbleWrap.appendChild(bubble);
    return;
  }

  if (data.type === 'done') {
    if (state.textBubble) {
      const cursor = state.textBubble.querySelector('.cursor');
      if (cursor) cursor.remove();
    }
    scrollToBottom();
    return;
  }
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = '';
  sendBtn.disabled = true;

  createUserGroup(text);
  const ai = createAiGroup();
  scrollToBottom();

  const state = { blocks: {}, toolsById: {}, textBubble: null };

  try {
    const base = await resolveApiBase();
    const resp = await fetch(base + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });
    if (!resp.body) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        const jsonStr = line.slice(5).trim();
        let data;
        try { data = JSON.parse(jsonStr); } catch (e) { continue; }
        handleEvent(data, ai, state);
      }
    }
  } catch (err) {
    const bubble = el('div', 'bubble ai-bubble error-bubble', '请求失败：' + err.message);
    ai.bubbleWrap.appendChild(bubble);
  } finally {
    sendBtn.disabled = false;
    scrollToBottom();
  }
}

/* ---------- input behaviour ---------- */
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', sendMessage);
</script>
